<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body { background:#fff; overflow:hidden; width:100vw; height:100vh; cursor:none; font-family:'Heebo',sans-serif; }
#imgWrapper { position:relative; width:100vw; height:100vh; overflow:hidden; }
#mainImg { display:block; width:100%; height:100%; object-fit:contain; background:#000; }
#dotCanvas { position:absolute; inset:0; pointer-events:none; z-index:5; }
#annLayer  { position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:6; opacity:0; }
#gazeDot { position:fixed; width:22px; height:22px; border-radius:50%; border:2px solid rgba(224,26,0,0.85); background:rgba(224,26,0,0.12); transform:translate(-50%,-50%); pointer-events:none; z-index:50; }
#webcamEl { position:fixed; bottom:8px; right:8px; width:96px; height:72px; opacity:0.05; transform:scaleX(-1); border:1px solid #ccc; z-index:50; }
#info { position:fixed; bottom:14px; left:50%; transform:translateX(-50%); font-family:'Heebo',sans-serif; font-size:10px; font-weight:300; letter-spacing:0.22em; color:rgba(0,0,0,0.35); pointer-events:none; transition:opacity 2s ease; white-space:nowrap; z-index:50; }

.va-btn { font-family:'Heebo',sans-serif; letter-spacing:0.22em; cursor:pointer; transition:background 0.18s,color 0.18s,border-color 0.18s; }
.va-btn-primary { background:#e01a00; color:#fff; border:2px solid #e01a00; font-size:13px; font-weight:700; padding:16px 52px; }
.va-btn-primary:hover { background:#c01500; border-color:#c01500; }
.va-btn-secondary { background:#fff; color:#111; border:2px solid #111; font-size:12px; font-weight:700; padding:12px 36px; }
.va-btn-secondary:hover { background:#111; color:#fff; }

#calOverlay { position:fixed; inset:0; z-index:1000; background:#fff; }
#calCanvas { position:absolute; inset:0; width:100%; height:100%; }
#calStartBtn { position:absolute; top:58%; left:50%; transform:translateX(-50%); display:none; z-index:1001; }

.screen { display:none; position:fixed; inset:0; z-index:1100; background:#fff; flex-direction:column; align-items:center; justify-content:center; }
.screen-title { font-size:9px; font-weight:300; letter-spacing:0.6em; color:#bbb; margin-bottom:36px; }

.lib-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; max-width:720px; width:90vw; margin-bottom:36px; max-height:52vh; overflow-y:auto; }
.lib-card { aspect-ratio:4/3; border:1.5px solid #e0e0e0; cursor:pointer; overflow:hidden; position:relative; transition:border-color 0.15s; }
.lib-card:hover { border-color:#999; }
.lib-card.selected { border-color:#e01a00; }
.lib-card img { width:100%; height:100%; object-fit:cover; display:block; }
.lib-num { position:absolute; top:6px; left:8px; font-size:9px; font-weight:700; color:#fff; text-shadow:0 0 4px rgba(0,0,0,0.8); letter-spacing:0.1em; }
.lib-add { aspect-ratio:4/3; border:1.5px dashed #ddd; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:6px; transition:border-color 0.15s; }
.lib-add:hover { border-color:#999; }
.lib-add-plus { font-size:28px; color:#ccc; line-height:1; }
.lib-add-label { font-size:9px; font-weight:300; letter-spacing:0.2em; color:#ccc; }
#libFileInput { display:none; }

#dataBtn { position:fixed; bottom:16px; left:16px; font-size:10px; font-weight:700; letter-spacing:0.18em; color:#111; cursor:pointer; z-index:60; transition:color 0.15s,border-color 0.15s; user-select:none; background:#fff; border:1.5px solid #ddd; padding:8px 14px; display:none; }
#dataBtn:hover { color:#e01a00; border-color:#e01a00; }

#dataScreen { display:none; position:fixed; inset:0; z-index:1500; background:#fff; flex-direction:column; overflow:hidden; }
#dataHeader { display:flex; align-items:center; justify-content:space-between; padding:18px 32px; border-bottom:1px solid #eee; flex-shrink:0; }
#dataHeader .data-title { font-size:9px; font-weight:300; letter-spacing:0.55em; color:#bbb; }
#dataBody { display:flex; flex:1; overflow:hidden; }
#dataImgList { width:180px; flex-shrink:0; border-right:1px solid #eee; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:8px; }
.d-thumb { border:1.5px solid #eee; cursor:pointer; overflow:hidden; aspect-ratio:4/3; position:relative; transition:border-color 0.15s; }
.d-thumb:hover { border-color:#999; }
.d-thumb.active { border-color:#e01a00; }
.d-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
.d-thumb-label { position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,0.55); font-size:9px; font-weight:300; letter-spacing:0.08em; color:#fff; padding:3px 6px; }
#dataCenter { flex:1; display:flex; flex-direction:column; overflow:hidden; border-right:1px solid #eee; }
#dataImgArea { position:relative; flex:1; overflow:hidden; background:#111; }
#dataImg { width:100%; height:100%; object-fit:contain; display:block; }
#dataCanvas { position:absolute; inset:0; pointer-events:none; }
#dataLayerBar { display:flex; border-top:1px solid #eee; flex-shrink:0; align-items:stretch; }
.layer-btn { flex:1; padding:8px 2px; font-family:'Heebo',sans-serif; font-size:9px; font-weight:700; letter-spacing:0.08em; color:#aaa; background:#fff; border:none; border-right:1px solid #eee; cursor:pointer; transition:color 0.15s,background 0.15s; }
.layer-btn:hover { color:#111; background:#fafafa; }
.layer-btn.active { color:#e01a00; background:#fff8f8; }
#playBtn { padding:8px 14px; font-family:'Heebo',sans-serif; font-size:10px; font-weight:700; letter-spacing:0.12em; color:#fff; background:#e01a00; border:none; cursor:pointer; flex-shrink:0; transition:background 0.15s; }
#playBtn:hover { background:#c01500; }
#dataStats { width:220px; flex-shrink:0; overflow-y:auto; padding:18px 14px; }
.stat-group { margin-bottom:18px; }
.stat-label { font-size:8px; font-weight:300; letter-spacing:0.35em; color:#bbb; margin-bottom:10px; }
.stat-row { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; padding-bottom:6px; border-bottom:1px solid #f5f5f5; }
.stat-name { font-size:10px; font-weight:300; color:#999; }
.stat-val { font-size:13px; font-weight:700; color:#111; }
.stat-unit { font-size:9px; font-weight:300; color:#bbb; margin-left:2px; }

#nameScreen { display:none; position:fixed; inset:0; z-index:2000; background:#fff; flex-direction:column; align-items:center; justify-content:center; }
.ns-title { font-size:9px; font-weight:300; letter-spacing:0.55em; color:#bbb; margin-bottom:72px; }
#nameScreen label { display:block; font-size:10px; font-weight:700; letter-spacing:0.3em; color:#111; margin-bottom:18px; }
#nameInput { background:transparent; border:none; border-bottom:2px solid #111; color:#111; font-family:'Heebo',sans-serif; font-size:18px; letter-spacing:0.15em; padding:10px 6px; text-align:center; width:280px; caret-color:#e01a00; }
#nameInput:focus { border-bottom-color:#e01a00; outline:none; }
</style>

<body>

<div id="imgWrapper">
  <img id="mainImg" src="" alt="stimulus"/>
  <canvas id="dotCanvas"></canvas>
  <div id="annLayer"></div>
</div>

<div id="gazeDot"></div>
<video id="webcamEl" autoplay muted playsinline></video>
<div id="info">ALLOW CAMERA ACCESS</div>

<div id="calOverlay">
  <canvas id="calCanvas"></canvas>
  <button id="calStartBtn" class="va-btn va-btn-primary">BEGIN CALIBRATION</button>
</div>

<!-- image library -->
<div id="libraryScreen" class="screen">
  <div class="screen-title">SELECT IMAGE</div>
  <div class="lib-grid" id="libGrid"></div>
  <input type="file" id="libFileInput" accept="image/*" multiple>

<div id="dataBtn">DATA</div>

<!-- data screen -->
<div id="dataScreen">

        <div class="stat-row"><span class="stat-name">Avg amplitude</span><span><span class="stat-val" id="st-sac-amp">—</span><span class="stat-unit">%</span></span></div>

        <div class="stat-row"><span class="stat-name">Duration</span><span><span class="stat-val" id="st-duration">—</span><span class="stat-unit">s</span></span></div>

<!-- name screen -->
<div id="nameScreen">
  <div class="ns-title">VISUAL ANALYSIS SYSTEM</div>
  <label for="nameInput">ENTER YOUR NAME</label>

  <button id="nameContinue" class="va-btn va-btn-primary" style="margin-top:44px;">CONTINUE</button>

<script type="module">
'use strict';
import { FaceLandmarker, FilesetResolver } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs';

/* ══════════════════════════════════════════════════════════════════════
   CONSTANTS
   ══════════════════════════════════════════════════════════════════════ */
const FIX_DISPERSION   = 0.04;
const FIX_MIN_DURATION = 150;
const SAC_VELOCITY     = 0.8;
const SAC_MIN_AMP      = 0.03;
const W_HEAT = 200, H_HEAT = 112;
const HEAT_SIGMA  = 0.07;
const HEAT_WEIGHT = 0.18;
const HEAT_DECAY  = 0.9975;
const GAZE_LERP   = 0.08;
const CAL_PTS = [
  [0.1,0.1],[0.5,0.1],[0.9,0.1],
  [0.9,0.5],[0.5,0.5],[0.1,0.5],
  [0.1,0.9],[0.5,0.9],[0.9,0.9]
];
const CAL_VAR_THRESH = 0.0012;
const CAL_FILL_RATE  = 0.6;
const CAL_DRAIN_RATE = 0.8;
const BUF_MAX = 30;

/* ══════════════════════════════════════════════════════════════════════
   DOM
   ══════════════════════════════════════════════════════════════════════ */
const mainImg    = document.getElementById('mainImg');
const imgWrapper = document.getElementById('imgWrapper');
const dotCanvas  = document.getElementById('dotCanvas');
const dotCtx     = dotCanvas.getContext('2d');
const annLayer   = document.getElementById('annLayer');
const gazeDot    = document.getElementById('gazeDot');
const webcamEl   = document.getElementById('webcamEl');
const infoEl     = document.getElementById('info');
const calOverlay = document.getElementById('calOverlay');
const calCanvas  = document.getElementById('calCanvas');
const calCtx     = calCanvas.getContext('2d');
const calStartBtn = document.getElementById('calStartBtn');

/* ══════════════════════════════════════════════════════════════════════
   STATE
   ══════════════════════════════════════════════════════════════════════ */
let currentUser = '';
let imageLibrary = [], currentImageIdx = 0;

// Analysis
let fixationHistory  = [], currentFixation = null;
let scanPathHistory  = [];
let saccadeHistory   = [], saccadeActive = false, saccadeStart = null;
let heatmap          = new Float32Array(W_HEAT * H_HEAT);
let heatCanvas, heatCtx2;
let firstFix         = null, firstFixDone = false, firstFixModeTs = 0;
let sessionStartTs   = 0;
let gazeLog          = [];

// Gaze runtime
let rawGX = 0.5, rawGY = 0.5;
let sGX   = 0.5, sGY   = 0.5;
let gazeOn = false, lastGazeTs = 0;

// Tracking buffers
let curOffX = 0.5, curOffY = 0.5;
let curEyeOffX = 0.5, curEyeOffY = 0.5, eyeValid = false;
const offXBuf = [], offYBuf = [];
const eyeOffXBuf = [], eyeOffYBuf = [];
let eyeCalMap = null;

window._gazeHistory = [];

// Data screen animation
let currentAnimation = null;
let dataActiveLayer  = 'GAZE';

/* ══════════════════════════════════════════════════════════════════════
   EYE STABILITY  (used by calibration)
   ══════════════════════════════════════════════════════════════════════ */
function eyeStab() {
  const N = Math.min(eyeOffXBuf.length, 20);
  if (N < 8) return 0;
  const xs = eyeOffXBuf.slice(-N), ys = eyeOffYBuf.slice(-N);
  const mx = xs.reduce((a,b)=>a+b,0)/N, my = ys.reduce((a,b)=>a+b,0)/N;
  const vx = xs.reduce((a,b)=>a+(b-mx)**2,0)/N;
  const vy = ys.reduce((a,b)=>a+(b-my)**2,0)/N;
  return Math.max(0, Math.min(1, 1-(vx+vy)/CAL_VAR_THRESH));
}

/* ══════════════════════════════════════════════════════════════════════
   ANALYSIS — FIXATION I-DT
   ══════════════════════════════════════════════════════════════════════ */
function updateFixations(ts) {
  const gh = window._gazeHistory;
  if (gh.length < 2) return;
  const win = gh.filter(p => p.ts > ts - 600);
  if (win.length < 2) return;
  const xs = win.map(p => p.x), ys = win.map(p => p.y);
  const disp = (Math.max(...xs)-Math.min(...xs)) + (Math.max(...ys)-Math.min(...ys));
  if (disp < FIX_DISPERSION) {
    const cx = xs.reduce((a,b)=>a+b,0)/xs.length;
    const cy = ys.reduce((a,b)=>a+b,0)/ys.length;
    if (!currentFixation) {
      currentFixation = { startTs:ts, cx, cy };
    } else {
      currentFixation.cx = cx; currentFixation.cy = cy;
      currentFixation.duration = ts - currentFixation.startTs;
    }
  } else {
    if (currentFixation) {
      const dur = ts - currentFixation.startTs;
      if (dur >= FIX_MIN_DURATION) {
        const fe = { x:currentFixation.cx, y:currentFixation.cy, startTs:currentFixation.startTs, endTs:ts, duration:dur };
        fixationHistory.push(fe);
        if (fixationHistory.length > 100) fixationHistory.shift();
        scanPathHistory.push(fe);
        if (scanPathHistory.length > 50) scanPathHistory.shift();
      }
      currentFixation = null;
    }
  }
}

/* ══════════════════════════════════════════════════════════════════════
   ANALYSIS — SACCADE I-VT
   ══════════════════════════════════════════════════════════════════════ */
function updateSaccades(ts) {
  const gh = window._gazeHistory;
  if (gh.length < 2) return;
  const last = gh[gh.length-1], prev = gh[gh.length-2];
  const dt = (last.ts - prev.ts) / 1000;
  if (dt <= 0) return;
  const vel = Math.hypot(last.x-prev.x, last.y-prev.y) / dt;
  if (vel >= SAC_VELOCITY) {
    if (!saccadeActive) { saccadeActive = true; saccadeStart = {x:prev.x, y:prev.y, ts:prev.ts}; }
  } else {
    if (saccadeActive && saccadeStart) {
      const amp = Math.hypot(last.x-saccadeStart.x, last.y-saccadeStart.y);
      if (amp >= SAC_MIN_AMP) {
        saccadeHistory.push({ fromX:saccadeStart.x, fromY:saccadeStart.y, toX:last.x, toY:last.y, startTs:saccadeStart.ts, endTs:ts, duration:ts-saccadeStart.ts });
        if (saccadeHistory.length > 100) saccadeHistory.shift();
      }
      saccadeActive = false; saccadeStart = null;
    }
  }
}

/* ══════════════════════════════════════════════════════════════════════
   ANALYSIS — HEATMAP
   ══════════════════════════════════════════════════════════════════════ */
function updateHeatmap() {
  for (let i = 0; i < heatmap.length; i++) heatmap[i] *= HEAT_DECAY;
  const gx = sGX*W_HEAT, gy = sGY*H_HEAT;
  const sigma = HEAT_SIGMA * Math.max(W_HEAT, H_HEAT);
  const r = Math.ceil(3*sigma);
  const x0 = Math.max(0, Math.floor(gx-r)), x1 = Math.min(W_HEAT-1, Math.ceil(gx+r));
  const y0 = Math.max(0, Math.floor(gy-r)), y1 = Math.min(H_HEAT-1, Math.ceil(gy+r));
  const inv2s2 = 1/(2*sigma*sigma);
  for (let y = y0; y <= y1; y++)
    for (let x = x0; x <= x1; x++)
      heatmap[y*W_HEAT+x] += HEAT_WEIGHT * Math.exp(-((x-gx)**2+(y-gy)**2)*inv2s2);
}

/* ══════════════════════════════════════════════════════════════════════
   ANALYSIS — FIRST FIXATION
   ══════════════════════════════════════════════════════════════════════ */
function updateFirstFix() {
  if (firstFixDone) return;
  const recent = fixationHistory.filter(f => f.startTs >= firstFixModeTs);
  if (recent.length > 0) { firstFix = recent[0]; firstFixDone = true; }
}

/* ══════════════════════════════════════════════════════════════════════
   MAIN DRAW FRAME  (live view: gaze dot only, no overlays)
   ══════════════════════════════════════════════════════════════════════ */
function drawFrame() {
  dotCtx.clearRect(0, 0, dotCanvas.width, dotCanvas.height);
}

/* ══════════════════════════════════════════════════════════════════════
   GAZE APPLICATION
   ══════════════════════════════════════════════════════════════════════ */
function applyGaze(ts) {
  lastGazeTs = ts;
  sGX += (rawGX - sGX) * GAZE_LERP;
  sGY += (rawGY - sGY) * GAZE_LERP;
  const W = imgWrapper.offsetWidth, H = imgWrapper.offsetHeight;
  if (!W || !H) return;
  const rect = imgWrapper.getBoundingClientRect();
  gazeDot.style.left = (rect.left + sGX*W) + 'px';
  gazeDot.style.top  = (rect.top  + sGY*H) + 'px';
  window._gazeHistory.push({x:sGX, y:sGY, ts});
  if (window._gazeHistory.length > 90) window._gazeHistory.shift();
}

/* ══════════════════════════════════════════════════════════════════════
   MAIN LOOP
   ══════════════════════════════════════════════════════════════════════ */
function mainLoop(ts) {
  applyGaze(ts);
  updateFixations(ts);
  updateSaccades(ts);
  updateHeatmap();
  updateFirstFix();
  drawFrame();
  requestAnimationFrame(mainLoop);
}

/* ══════════════════════════════════════════════════════════════════════
   AFFINE FIT
   ══════════════════════════════════════════════════════════════════════ */
function fitAffine(data) {
  let A00=0,A01=0,A02=0,A11=0,A12=0,Bx0=0,Bx1=0,Bx2=0,By0=0,By1=0,By2=0;
  const n = data.length;
  for (const d of data) {
    A00+=d.ox*d.ox; A01+=d.ox*d.oy; A02+=d.ox;
    A11+=d.oy*d.oy; A12+=d.oy;
    Bx0+=d.ox*d.sx; Bx1+=d.oy*d.sx; Bx2+=d.sx;
    By0+=d.ox*d.sy; By1+=d.oy*d.sy; By2+=d.sy;
  }
  const M = [[A00,A01,A02],[A01,A11,A12],[A02,A12,n]];
  const inv = inv3(M); if (!inv) return null;
  const [ax,bx,cx] = mv3(inv,[Bx0,Bx1,Bx2]);
  const [ay,by,cy] = mv3(inv,[By0,By1,By2]);
  return {ax,bx,cx,ay,by,cy};
}
function inv3(m) {
  const [[a,b,c],[d,e,f],[g,h,k]] = m;
  const det = a*(e*k-f*h)-b*(d*k-f*g)+c*(d*h-e*g);
  if (Math.abs(det) < 1e-12) return null;
  const s = 1/det;
  return [[(e*k-f*h)*s,(c*h-b*k)*s,(b*f-c*e)*s],
          [(f*g-d*k)*s,(a*k-c*g)*s,(c*d-a*f)*s],
          [(d*h-e*g)*s,(b*g-a*h)*s,(a*e-b*d)*s]];
}
function mv3(m,v) {
  return [m[0][0]*v[0]+m[0][1]*v[1]+m[0][2]*v[2],
          m[1][0]*v[0]+m[1][1]*v[1]+m[1][2]*v[2],
          m[2][0]*v[0]+m[2][1]*v[1]+m[2][2]*v[2]];
}

/* ══════════════════════════════════════════════════════════════════════
   CALIBRATION
   ══════════════════════════════════════════════════════════════════════ */
function resizeCal() { calCanvas.width = window.innerWidth; calCanvas.height = window.innerHeight; }

function drawCalIntro() {
  const W = calCanvas.width, H = calCanvas.height;
  calCtx.fillStyle='#fff'; calCtx.fillRect(0,0,W,H); calCtx.textAlign='center';
  calCtx.fillStyle='#111'; calCtx.font='bold 22px Heebo'; calCtx.fillText('EYE TRACKING CALIBRATION',W/2,H/2-52);
  calCtx.strokeStyle='#ddd'; calCtx.lineWidth=1; calCtx.beginPath(); calCtx.moveTo(W/2-220,H/2-36); calCtx.lineTo(W/2+220,H/2-36); calCtx.stroke();
  calCtx.fillStyle='#666'; calCtx.font='14px Heebo'; calCtx.fillText('Keep your HEAD STILL — move only your EYES to each dot',W/2,H/2-14);
  calCtx.fillText('Hold your gaze until the ring fills completely',W/2,H/2+8);
  calCtx.fillStyle='#aaa'; calCtx.font='12px Heebo'; calCtx.fillText('Head steady — only eyes should move',W/2,H/2+34);
}

function drawCalDone() {
  const W = calCanvas.width, H = calCanvas.height;
  calCtx.fillStyle='#fff'; calCtx.fillRect(0,0,W,H); calCtx.textAlign='center';
  calCtx.fillStyle='#111'; calCtx.font='bold 24px Heebo'; calCtx.fillText('SYNCHRONIZED',W/2,H/2-8);
  calCtx.fillStyle='#aaa'; calCtx.font='13px Heebo'; calCtx.fillText('Calibration complete',W/2,H/2+18);
}

function awaitDot(px, py, index) {
  return new Promise(resolve => {
    let progress = 0, prevTs = null;
    const samples = [];
    function frame(ts) {
      const dt = prevTs ? Math.min((ts-prevTs)/1000, 0.05) : 0; prevTs = ts;
      const s = eyeStab();
      progress += s*CAL_FILL_RATE*dt; progress -= (1-s)*CAL_DRAIN_RATE*dt;
      progress = Math.max(0, Math.min(1, progress));
      if (s > 0.45 && eyeValid) samples.push({ox:curEyeOffX, oy:curEyeOffY});
      const W = calCanvas.width, H = calCanvas.height;
      calCtx.fillStyle='#fff'; calCtx.fillRect(0,0,W,H);
      calCtx.textAlign='right'; calCtx.fillStyle='#aaa'; calCtx.font='14px Heebo';
      calCtx.fillText(`${index+1}  /  ${CAL_PTS.length}`, W-28, 36);
      calCtx.textAlign='center'; calCtx.fillStyle='#aaa'; calCtx.font='13px Heebo';
      calCtx.fillText('LOOK AT DOT · HEAD STILL · EYES ONLY', W/2, H-26);
      calCtx.beginPath(); calCtx.arc(px,py,22,0,Math.PI*2);
      calCtx.strokeStyle='#ddd'; calCtx.lineWidth=1.5; calCtx.stroke();
      if (progress > 0) {
        calCtx.beginPath(); calCtx.arc(px,py,22,-Math.PI/2,-Math.PI/2+progress*Math.PI*2);
        calCtx.strokeStyle=`rgba(224,26,0,${0.35+s*0.65})`; calCtx.lineWidth=2; calCtx.stroke();
      }
      const r = 3.5+s*2.5; calCtx.beginPath(); calCtx.arc(px,py,r,0,Math.PI*2);
      calCtx.fillStyle=`rgba(224,26,0,${0.2+s*0.8})`; calCtx.fill();
      if (progress >= 1) {
        calCtx.beginPath(); calCtx.arc(px,py,22,0,Math.PI*2);
        calCtx.strokeStyle='rgba(224,26,0,0.9)'; calCtx.lineWidth=2; calCtx.stroke();
        const n = samples.length || 1;
        setTimeout(() => resolve({
          ox: samples.reduce((a,v)=>a+v.ox,0)/n,
          oy: samples.reduce((a,v)=>a+v.oy,0)/n
        }), 280);
      } else requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  });
}

async function runCalibration() {
  resizeCal(); window.addEventListener('resize', resizeCal); drawCalIntro();
  calStartBtn.style.display = 'block';
  await new Promise(r => calStartBtn.addEventListener('click', r, {once:true}));
  calStartBtn.style.display = 'none';
  const calData = [];
  for (let i = 0; i < CAL_PTS.length; i++) {
    const [nx,ny] = CAL_PTS[i];
    const px = nx*window.innerWidth, py = ny*window.innerHeight;
    if (i > 0) await new Promise(r => setTimeout(r, 320));
    const {ox,oy} = await awaitDot(px, py, i);
    calData.push({sx:nx, sy:ny, ox, oy});
  }
  if (calData.length >= 4) eyeCalMap = fitAffine(calData);
  drawCalDone();
  await new Promise(r => setTimeout(r, 900));
  calOverlay.style.display = 'none';
}

/* ══════════════════════════════════════════════════════════════════════
   EYE TRACKING
   ══════════════════════════════════════════════════════════════════════ */
async function startEyeTracking() {
  let fl;
  try {
    const fs = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm');
    fl = await FaceLandmarker.createFromOptions(fs, {
      baseOptions:{ modelAssetPath:'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task', delegate:'GPU' },
      outputFaceBlendshapes:false, runningMode:'VIDEO', numFaces:1
    });
  } catch(e) { console.warn('[eye]',e); return false; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:320},height:{ideal:240}}});
    webcamEl.srcObject = stream;
    await new Promise(r => { webcamEl.onloadeddata = r; });
  } catch(e) { console.warn('[eye] webcam',e); return false; }

  let lastCamT = -1;
  function track() {
    if (webcamEl.readyState >= 2 && webcamEl.currentTime !== lastCamT) {
      lastCamT = webcamEl.currentTime;
      try {
        const res = fl.detectForVideo(webcamEl, performance.now());
        if (res.faceLandmarks?.length > 0) {
          const lm = res.faceLandmarks[0];
          const nose=lm[1], brow=lm[168], chin=lm[152], lChk=lm[234], rChk=lm[454];
          const hxR = (nose.x*4+brow.x+chin.x+lChk.x+rChk.x)/8;
          const hyR = (nose.y*4+brow.y+chin.y+lChk.y+rChk.y)/8;
          curOffX = 1-hxR; curOffY = hyR;
          offXBuf.push(curOffX); if (offXBuf.length > BUF_MAX) offXBuf.shift();
          offYBuf.push(curOffY); if (offYBuf.length > BUF_MAX) offYBuf.shift();
          const lI=lm[468], rI=lm[473], lIn=lm[33], lO=lm[133], rIn=lm[362], rO=lm[263];
          if (lI && rI && lIn && lO && rIn && rO) {
            const lEW = Math.hypot(lO.x-lIn.x, lO.y-lIn.y);
            const rEW = Math.hypot(rO.x-rIn.x, rO.y-rIn.y);
            if (lEW > 0.01 && rEW > 0.01) {
              let eX = ((lI.x-lIn.x)/lEW + (rI.x-rIn.x)/rEW) / 2;
              let eY = ((lI.y-lIn.y)/lEW + (rI.y-rIn.y)/rEW) / 2;
              eX = (eX-0.5)*2.5+0.5; eY = (eY-0.5)*2.5+0.5; eX = 1-eX;
              curEyeOffX = eX; curEyeOffY = eY;
              eyeOffXBuf.push(eX); if (eyeOffXBuf.length > BUF_MAX) eyeOffXBuf.shift();
              eyeOffYBuf.push(eY); if (eyeOffYBuf.length > BUF_MAX) eyeOffYBuf.shift();
              eyeValid = true;
              if (eyeCalMap) {
                rawGX = eyeCalMap.ax*eX + eyeCalMap.bx*eY + eyeCalMap.cx;
                rawGY = eyeCalMap.ay*eX + eyeCalMap.by*eY + eyeCalMap.cy;
              } else { rawGX = eX; rawGY = eY; }
              rawGX = Math.max(0, Math.min(1, rawGX));
              rawGY = Math.max(0, Math.min(1, rawGY));
              if (!gazeOn) { gazeOn = true; infoEl.style.opacity = '0'; }
            } else eyeValid = false;
          } else eyeValid = false;
        }
      } catch(_) {}
    }
    requestAnimationFrame(track);
  }
  requestAnimationFrame(track);
  return true;
}

function enablePointerFallback() {
  infoEl.textContent = 'MOVE MOUSE TO EXPLORE';
  const onMove = (cx,cy) => {
    const rect = imgWrapper.getBoundingClientRect();
    const nx = (cx-rect.left)/rect.width, ny = (cy-rect.top)/rect.height;
    if (nx>=0&&nx<=1&&ny>=0&&ny<=1) { rawGX=nx; rawGY=ny; if(!gazeOn){gazeOn=true;infoEl.style.opacity='0';} }
  };
  document.addEventListener('mousemove', e => onMove(e.clientX,e.clientY));
  document.addEventListener('touchmove', e => { e.preventDefault(); onMove(e.touches[0].clientX,e.touches[0].clientY); }, {passive:false});
}

function renderStats() {
  const fixC     = fixationHistory.length;
  const fixAvg   = fixC ? Math.round(fixationHistory.reduce((s,f)=>s+f.duration,0)/fixC) : 0;
  const fixTotal = fixationHistory.reduce((s,f)=>s+f.duration, 0);
  const sacC     = saccadeHistory.length;
  const sacAmp   = sacC ? +(saccadeHistory.reduce((s,f)=>s+Math.hypot(f.toX-f.fromX,f.toY-f.fromY),0)/sacC*100).toFixed(1) : 0;
  const ttff     = firstFix ? (firstFix.startTs - firstFixModeTs) / 1000 : null;

  document.getElementById('st-sac-count').textContent  = sacC  || '—';
  document.getElementById('st-sac-amp').textContent    = sacAmp || '—';
  document.getElementById('st-scan-steps').textContent = scanPathHistory.length || '—';
  document.getElementById('st-ttff').textContent       = ttff !== null ? ttff.toFixed(2) : '—';
  document.getElementById('st-ff-x').textContent       = firstFix ? (firstFix.x*100).toFixed(1)+'%' : '—';

/* ══════════════════════════════════════════════════════════════════════
   DATA SCREEN — ANIMATION ENGINE
   ══════════════════════════════════════════════════════════════════════ */
function cancelAnimation() {
  if (currentAnimation) { currentAnimation.cancel(); currentAnimation = null; }
}

function getDataCanvas() {
  const dc = document.getElementById('dataCanvas');
  const area = document.getElementById('dataImgArea');
  dc.width = area.offsetWidth; dc.height = area.offsetHeight;
  return dc;
}

// GAZE: replay gazeLog one point every 50ms, red dot r=4, accumulates
function animateGaze(ctx, W, H, log) {
  let tid = null, cancelled = false;
  const pts = log.slice(); let i = 0;
  function step() {
    if (cancelled || i >= pts.length) return;
    const p = pts[i++];
    ctx.beginPath(); ctx.arc(p.x*W, p.y*H, 4, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(224,26,0,0.5)'; ctx.fill();
    tid = setTimeout(step, 50);
  }
  step();
  return { cancel: () => { cancelled=true; clearTimeout(tid); } };
}

// FIXATION: one every 600ms, circle grows 0→final over 300ms, label after, previous stay
function animateFixation(ctx, W, H, history) {
  let tid = null, rafId = null, cancelled = false;
  const fixes = history.slice(); let i = 0;
  const drawn = [];

  function redrawAll() {
    for (const fix of drawn) {
      const cx=fix.x*W, cy=fix.y*H, r=Math.min(8+fix.duration/80,44);
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fillStyle='rgba(224,26,0,0.12)'; ctx.fill();
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.strokeStyle='rgba(224,26,0,0.85)'; ctx.lineWidth=2; ctx.stroke();
      if (fix.duration > 300) {
        ctx.fillStyle='rgba(224,26,0,0.9)'; ctx.font='bold 9px Heebo';
        ctx.textAlign='center'; ctx.textBaseline='alphabetic';
        ctx.fillText(Math.round(fix.duration)+'ms', cx, cy+r+13);
      }
    }
  }

  function next() {
    if (cancelled || i >= fixes.length) return;
    const fix = fixes[i++];
    const cx=fix.x*W, cy=fix.y*H, rFinal=Math.min(8+fix.duration/80,44);
    const start = performance.now();
    function grow(now) {
      if (cancelled) return;
      const t = Math.min(1, (now-start)/300);
      ctx.clearRect(0,0,W,H); redrawAll();
      const r = rFinal*t;
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fillStyle='rgba(224,26,0,0.12)'; ctx.fill();
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.strokeStyle='rgba(224,26,0,0.85)'; ctx.lineWidth=2; ctx.stroke();
      if (t < 1) { rafId = requestAnimationFrame(grow); }
      else {
        if (fix.duration > 300) {
          ctx.fillStyle='rgba(224,26,0,0.9)'; ctx.font='bold 9px Heebo';
          ctx.textAlign='center'; ctx.textBaseline='alphabetic';
          ctx.fillText(Math.round(fix.duration)+'ms', cx, cy+rFinal+13);
        }
        drawn.push(fix);
        tid = setTimeout(next, 600);
      }
    }
    rafId = requestAnimationFrame(grow);
  }
  next();
  return { cancel: () => { cancelled=true; clearTimeout(tid); cancelAnimationFrame(rafId); } };
}

// SACCADE: one every 500ms, line draws over 200ms, arrowhead, previous stay
function animateSaccade(ctx, W, H, history) {
  let tid = null, rafId = null, cancelled = false;
  const sacs = history.slice(); let i = 0;
  const drawn = [];

  function drawSacFull(sac) {
    const fx=sac.fromX*W, fy=sac.fromY*H, tx=sac.toX*W, ty=sac.toY*H;
    ctx.beginPath(); ctx.moveTo(fx,fy); ctx.lineTo(tx,ty);
    ctx.strokeStyle='rgba(224,26,0,0.8)'; ctx.lineWidth=1.5; ctx.stroke();
    const a=Math.atan2(ty-fy,tx-fx), l=9;
    ctx.beginPath(); ctx.moveTo(tx,ty);
    ctx.lineTo(tx-l*Math.cos(a-Math.PI/6), ty-l*Math.sin(a-Math.PI/6));
    ctx.lineTo(tx-l*Math.cos(a+Math.PI/6), ty-l*Math.sin(a+Math.PI/6));
    ctx.closePath(); ctx.fillStyle='rgba(224,26,0,0.8)'; ctx.fill();
  }

  function redrawAll() { for (const s of drawn) drawSacFull(s); }

  function next() {
    if (cancelled || i >= sacs.length) return;
    const sac = sacs[i++];
    const fx=sac.fromX*W, fy=sac.fromY*H, tx=sac.toX*W, ty=sac.toY*H;
    const start = performance.now();
    function anim(now) {
      if (cancelled) return;
      const t = Math.min(1, (now-start)/200);
      ctx.clearRect(0,0,W,H); redrawAll();
      const ex=fx+(tx-fx)*t, ey=fy+(ty-fy)*t;
      ctx.beginPath(); ctx.moveTo(fx,fy); ctx.lineTo(ex,ey);
      ctx.strokeStyle='rgba(224,26,0,0.8)'; ctx.lineWidth=1.5; ctx.stroke();
      if (t < 1) { rafId = requestAnimationFrame(anim); }
      else { drawSacFull(sac); drawn.push(sac); tid = setTimeout(next, 500); }
    }
    rafId = requestAnimationFrame(anim);
  }
  next();
  return { cancel: () => { cancelled=true; clearTimeout(tid); cancelAnimationFrame(rafId); } };
}

// SCAN PATH: numbered circles + dashed lines, one step every 700ms
function animateScanPath(ctx, W, H, history) {
  let tid = null, cancelled = false;
  const pts = history.slice(); let shown = 0;

  function drawAll(n) {
    ctx.clearRect(0,0,W,H);
    if (n < 1) return;
    if (n >= 2) {
      ctx.save(); ctx.setLineDash([4,6]);
      ctx.strokeStyle='rgba(224,26,0,0.6)'; ctx.lineWidth=1.5;
      ctx.beginPath();
      for (let j=0; j<n; j++) { const{x,y}=pts[j]; j===0?ctx.moveTo(x*W,y*H):ctx.lineTo(x*W,y*H); }
      ctx.stroke(); ctx.setLineDash([]); ctx.restore();
    }
    for (let j=0; j<n; j++) {
      const{x,y}=pts[j], cx=x*W, cy=y*H;
      ctx.beginPath(); ctx.arc(cx,cy,11,0,Math.PI*2);
      ctx.strokeStyle='rgba(224,26,0,1)'; ctx.lineWidth=2; ctx.stroke();
      ctx.fillStyle='rgba(224,26,0,1)'; ctx.font='bold 9px Heebo';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(j+1, cx, cy); ctx.textBaseline='alphabetic';
    }
  }

  function next() {
    if (cancelled || shown >= pts.length) return;
    shown++;
    drawAll(shown);
    tid = setTimeout(next, 700);
  }
  next();
  return { cancel: () => { cancelled=true; clearTimeout(tid); } };
}

// HEATMAP: accumulate gazeLog at 20x speed, contour style, ~3s total
function animateHeatmap(ctx, W, H, log) {
  let tid = null, cancelled = false;
  const pts = log.slice(); let i = 0;
  const hmW=200, hmH=112;
  const hm = new Float32Array(hmW*hmH);
  const sigma = 0.07*Math.max(hmW,hmH);
  const r2 = Math.ceil(3*sigma);
  const inv2s2 = 1/(2*sigma*sigma);

  function addPt(p) {
    const gx=p.x*hmW, gy=p.y*hmH;
    const x0=Math.max(0,Math.floor(gx-r2)), x1=Math.min(hmW-1,Math.ceil(gx+r2));
    const y0=Math.max(0,Math.floor(gy-r2)), y1=Math.min(hmH-1,Math.ceil(gy+r2));
    for (let y=y0;y<=y1;y++) for (let x=x0;x<=x1;x++)
      hm[y*hmW+x] += 0.18*Math.exp(-((x-gx)**2+(y-gy)**2)*inv2s2);
  }

  function render() {
    let mx = 0; for (let j=0;j<hm.length;j++) if(hm[j]>mx) mx=hm[j];
    if (mx < 0.01) return;
    const tmp = document.createElement('canvas'); tmp.width=hmW; tmp.height=hmH;
    const tc = tmp.getContext('2d'); const img = tc.createImageData(hmW,hmH); const d=img.data;
    for (let j=0;j<hmW*hmH;j++) {
      const val=hm[j]/mx; if(val<0.08) continue;
      const x=j%hmW, y=Math.floor(j/hmW);
      if(x<1||x>=hmW-1||y<1||y>=hmH-1) continue;
      const nb=[hm[j-1],hm[j+1],hm[j-hmW],hm[j+hmW]].map(v=>v/mx);
      let isCont=false;
      for (const band of [0.2,0.4,0.6,0.8]) {
        if((val>=band&&nb.some(n=>n<band))||(val<band&&nb.some(n=>n>=band))){isCont=true;break;}
      }
      if (isCont) { const iv=Math.min(1,val*1.3); d[j*4]=224; d[j*4+1]=26; d[j*4+2]=0; d[j*4+3]=Math.round(iv*210); }
    }
    tc.putImageData(img,0,0);
    ctx.clearRect(0,0,W,H); ctx.drawImage(tmp,0,0,W,H);
  }

  const totalSteps = 60, interval = 50;
  const perStep = Math.max(1, Math.ceil(pts.length/totalSteps));

  function step() {
    if (cancelled) return;
    let c=0; while(i<pts.length && c<perStep){addPt(pts[i++]);c++;}
    render();
    if (i < pts.length) tid = setTimeout(step, interval);
  }
  step();
  return { cancel: () => { cancelled=true; clearTimeout(tid); } };
}

// FIRST FIXATION: 1s blank → red dot + expanding ring + label + pulse
function animateFirstFix(ctx, W, H, fix, modeTs) {
  let tid = null, rafId = null, cancelled = false;
  if (!fix) {
    ctx.fillStyle='rgba(150,150,150,0.7)'; ctx.font='300 11px Heebo';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('NO FIRST FIXATION DETECTED', W/2, H/2);
    return { cancel: () => {} };
  }
  const cx=fix.x*W, cy=fix.y*H;
  const offset = (fix.startTs - modeTs) / 1000;

  tid = setTimeout(() => {
    if (cancelled) return;
    const startPhase = performance.now();
    function phase2(now) {
      if (cancelled) return;
      const t = Math.min(1, (now-startPhase)/600);
      ctx.clearRect(0,0,W,H);
      const ringR = 20 + t*40;
      ctx.beginPath(); ctx.arc(cx,cy,ringR,0,Math.PI*2);
      ctx.strokeStyle=`rgba(224,26,0,${(1-t)*0.5})`; ctx.lineWidth=1.5; ctx.stroke();
      ctx.globalAlpha = t;
      ctx.beginPath(); ctx.arc(cx,cy,14,0,Math.PI*2);
      ctx.fillStyle='rgba(224,26,0,1)'; ctx.fill();
      ctx.globalAlpha = 1;
      if (t > 0.5) {
        ctx.globalAlpha = (t-0.5)*2;
        ctx.textAlign='center'; ctx.textBaseline='alphabetic';
        ctx.fillStyle='rgba(224,26,0,1)';
        ctx.font='bold 11px Heebo'; ctx.fillText('FIRST FIXATION', cx, cy-46);
        ctx.font='300 9px Heebo';  ctx.fillText('+'+offset.toFixed(2)+'s', cx, cy-32);
        ctx.globalAlpha = 1;
      }
      if (t < 1) { rafId = requestAnimationFrame(phase2); }
      else {
        const startPulse = performance.now();
        function pulse(now) {
          if (cancelled) return;
          const pt = (now-startPulse)/1000;
          const pr = 20 + Math.sin(pt*Math.PI*2)*5;
          ctx.clearRect(0,0,W,H);
          ctx.beginPath(); ctx.arc(cx,cy,pr,0,Math.PI*2);
          ctx.strokeStyle='rgba(224,26,0,0.35)'; ctx.lineWidth=1.5; ctx.stroke();
          ctx.beginPath(); ctx.arc(cx,cy,14,0,Math.PI*2);
          ctx.fillStyle='rgba(224,26,0,1)'; ctx.fill();
          ctx.textAlign='center'; ctx.textBaseline='alphabetic';
          ctx.fillStyle='rgba(224,26,0,1)';
          ctx.font='bold 11px Heebo'; ctx.fillText('FIRST FIXATION', cx, cy-46);
          ctx.font='300 9px Heebo';  ctx.fillText('+'+offset.toFixed(2)+'s', cx, cy-32);
          rafId = requestAnimationFrame(pulse);
        }
        rafId = requestAnimationFrame(pulse);
      }
    }
    rafId = requestAnimationFrame(phase2);
  }, 1000);

  return { cancel: () => { cancelled=true; clearTimeout(tid); cancelAnimationFrame(rafId); } };
}

function playLayer(layer) {
  cancelAnimation();
  const dc = getDataCanvas();
  const ctx = dc.getContext('2d');
  ctx.clearRect(0,0,dc.width,dc.height);
  const W=dc.width, H=dc.height;
  switch (layer) {
    case 'GAZE':     currentAnimation = animateGaze(ctx,W,H,gazeLog); break;
    case 'FIXATION': currentAnimation = animateFixation(ctx,W,H,fixationHistory); break;
    case 'SACCADE':  currentAnimation = animateSaccade(ctx,W,H,saccadeHistory); break;
    case 'SCANPATH': currentAnimation = animateScanPath(ctx,W,H,scanPathHistory); break;
    case 'HEATMAP':  currentAnimation = animateHeatmap(ctx,W,H,gazeLog); break;
    case 'FIRSTFIX': currentAnimation = animateFirstFix(ctx,W,H,firstFix,firstFixModeTs); break;
  }
}

/* ══════════════════════════════════════════════════════════════════════
   DATA SCREEN — OPEN / CLOSE
   ══════════════════════════════════════════════════════════════════════ */
function openData() {
  const screen = document.getElementById('dataScreen');
  screen.style.display = 'flex';
  const list = document.getElementById('dataImgList'); list.innerHTML = '';
  if (mainImg.src && mainImg.src !== window.location.href) {
    const d = document.createElement('div'); d.className = 'd-thumb active';
    d.innerHTML = `<img src="${mainImg.src}" alt=""/><div class="d-thumb-label">${imageLibrary[currentImageIdx]?.name||'image'}</div>`;
    list.appendChild(d);
  }
  document.getElementById('dataImg').src = mainImg.src;
  renderStats();
  const activeBtn = document.querySelector('.layer-btn.active');
  const layer = activeBtn ? activeBtn.dataset.layer : 'GAZE';
  playLayer(layer);
}

/* ══════════════════════════════════════════════════════════════════════
   BOOT
   ══════════════════════════════════════════════════════════════════════ */
async function boot() {
  dotCanvas.width = window.innerWidth; dotCanvas.height = window.innerHeight;
  window.addEventListener('resize', () => { dotCanvas.width=window.innerWidth; dotCanvas.height=window.innerHeight; });

  heatCanvas = document.createElement('canvas');
  heatCanvas.width = W_HEAT; heatCanvas.height = H_HEAT;
  heatCtx2 = heatCanvas.getContext('2d');

  const ok = await startEyeTracking();
  if (ok) await runCalibration();
  else { calOverlay.style.display='none'; enablePointerFallback(); }

  showLib();
  await new Promise(resolve => {
    document.getElementById('libBeginBtn').addEventListener('click', () => {
      if (!imageLibrary.length) return;
      document.getElementById('libraryScreen').style.display = 'none';
      mainImg.src = imageLibrary[currentImageIdx].src;
      resolve();
    });
  });

  sessionStartTs  = Date.now();
  firstFixModeTs  = performance.now();

  document.getElementById('dataBtn').style.display = 'block';
  annLayer.style.opacity = '0';

  setInterval(() => {
    if (!gazeOn) return;
    gazeLog.push({ t:Date.now()-sessionStartTs, x:sGX, y:sGY });
    if (gazeLog.length > 10000) gazeLog.shift();
  }, 100);

  requestAnimationFrame(mainLoop);
}

/* ══════════════════════════════════════════════════════════════════════
   EVENTS
   ══════════════════════════════════════════════════════════════════════ */
document.getElementById('dataBtn').addEventListener('click', openData);

document.getElementById('dataCloseBtn').addEventListener('click', () => {
  cancelAnimation();
  document.getElementById('dataScreen').style.display = 'none';
});

document.getElementById('dataBtn').addEventListener('mouseenter', () => {
  document.getElementById('dataBtn').style.color='#e01a00';
  document.getElementById('dataBtn').style.borderColor='#e01a00';
});
document.getElementById('dataBtn').addEventListener('mouseleave', () => {
  document.getElementById('dataBtn').style.color='#111';
  document.getElementById('dataBtn').style.borderColor='#ddd';
});

document.querySelectorAll('.layer-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    dataActiveLayer = btn.dataset.layer;
    playLayer(dataActiveLayer);
  });
});

document.getElementById('playBtn').addEventListener('click', () => {
  playLayer(dataActiveLayer || 'GAZE');
});

async function startApp() { await showNameScreen(); await boot(); }
startApp();
</script>
